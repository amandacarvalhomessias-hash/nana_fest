<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Nana Fest 4.0</title>
</head>

<body>

<div>
   
    <div class="card">
        <form>
            <div class="logo">
                <h4>Nana Fest 4.0</h4>
            </div>
            <label>Nome completo</label>
            <input type="text"  required>
            <label>Encomendar Abadá? (R$ 30,00 unidade)</label>
            <select>
                <option value="">Selecione</option>
                <option>Sim</option>
                <option>Não</option>
            </select>
            <label>Tamanho do Abadá</label>
            <select>
                <option value="">Selecione</option>
                <option>P</option>
                <option>M</option>
                <option>G</option>
                <option>GG</option>
                <option>XG</option>
            </select>
            <div class="pix-section">
                <p class="pix-text">
                    Chave Pix para pagamento: <b>31991453960</b>
                </p>
                <div class="file-upload">
                    <label for="comprovante" class="custom-file">
                        ⬆ Arquivo
                    </label>
                    <input type="file" id="comprovante" hidden>
                    <span id="file-name">Nenhum selecionado</span>
                </div>
            </div>
            <button type="submit">CONFIRMAR PRESENÇA</button>
        </form>
    <div class="divisor"></div>

    <div class="event-info">
        <div>📅 <strong>Data:</strong> 06/06/2026</div>
        <div>⏰ <strong>Horário:</strong> 17 Horas</div>
        <div>📍 <strong>Local:</strong> Clix Multieventos</div>
        <div>📌 <strong>Endereço:</strong> Rua Ônix, 15, Arvoredo</div>
    </div>

    <div class="deadline-box">Confirmar presença até o dia 31/03/26.</div>
    <div class="small-text">Convite intransferível: Este convite é pessoal e não deve ser repassado.</div>

    </div>
</div>

</body>
</html>
